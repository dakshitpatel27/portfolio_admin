<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dakshit Gajipara</title>

  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- 3D Canvas Background -->
  <canvas id="three-bg"></canvas>

  <main>

    <!-- SIDEBAR -->
    <aside class="sidebar" data-sidebar>

      <div class="sidebar-info">

        <figure class="avatar-box" id="avatar-container">
          <!-- Rendered Dynamically -->
        </figure>

        <div class="info-content" id="profile-title-container">
          <!-- Rendered Dynamically -->
        </div>

        <button class="info_more-btn" data-sidebar-btn>
          <span>Show Contacts</span>
          <ion-icon name="chevron-down"></ion-icon>
        </button>

      </div>

      <div class="sidebar-info_more">

        <div class="separator"></div>

        <ul class="contacts-list" id="contacts-list-container">
          <!-- Rendered Dynamically -->
        </ul>

        <div class="separator"></div>

        <ul class="social-list" id="socials-container">
          <!-- Rendered Dynamically -->
        </ul>

      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">

      <!-- NAVBAR -->
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link>About</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link>Resume</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link>Projects</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link>Certifications</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link>Contact</button></li>
        </ul>
      </nav>

      <!-- ARTICLES CONTAINER -->
      <div class="articles-container">
        
        <!-- ABOUT -->
        <article class="about active" data-page="about">
          <header><h2 class="h2 article-title">About me</h2></header>

          <section class="about-text" id="about-text-container">
            <!-- Rendered Dynamically -->
          </section>

          <!-- What I'm Doing -->
          <section class="service">
            <h3 class="h3 service-title">What I'm doing</h3>
            <ul class="service-list" id="services-container">
              <!-- Rendered Dynamically -->
            </ul>
          </section>
        </article>

        <!-- RESUME -->
        <article class="resume" data-page="resume">
          <header><h2 class="h2 article-title">Resume</h2></header>
          
          <!-- Experience -->
          <section class="timeline">
            <div class="title-wrapper">
              <div class="icon-box">
                <ion-icon name="briefcase-outline"></ion-icon>
              </div>
              <h3 class="h3">Experience</h3>
            </div>
            
            <ol class="timeline-list" id="experience-container">
              <!-- Rendered Dynamically -->
            </ol>
          </section>

          <!-- Education -->
          <section class="timeline">
            <div class="title-wrapper">
              <div class="icon-box"><ion-icon name="book-outline"></ion-icon></div>
              <h3 class="h3">Education</h3>
            </div>

            <ol class="timeline-list" id="education-container">
              <!-- Rendered Dynamically -->
            </ol>
          </section>

          <!-- Skills -->
          <section class="skill">
            <h3 class="h3 skills-title">My Skills</h3>
            <ul class="skills-list content-card" id="skills-container">
              <!-- Rendered Dynamically -->
            </ul>
          </section>

          <!-- Download CV / Resume -->
          <section class="contact-download" id="resume-download-container" style="text-align:center; margin-top:2rem;">
            <!-- Rendered Dynamically -->
          </section>
        </article>

        <!-- CERTIFICATIONS -->
        <article class="certifications" data-page="certifications">
          <header><h2 class="h2 article-title">Certifications</h2></header>
        
          <section class="certificate-list">
            <ul id="certifications-container">
              <!-- Rendered Dynamically -->
            </ul>
          </section>
        </article>
        
        <!-- PROJECTS -->
        <article class="portfolio" data-page="portfolio">
          <header><h2 class="h2 article-title">Projects</h2></header>

          <section class="projects">
            <ul class="project-list" id="projects-container">
              <!-- Rendered Dynamically -->
            </ul>
          </section>
        </article>

        <!-- CONTACT -->
        <article class="contact" data-page="contact">
          <header>
            <h2 class="h2 article-title">Contact</h2>
          </header>

          <section class="contact-form">
            <h3 class="h3 form-title">Get in touch</h3>

            <form action="#" class="form" data-form>

              <div class="input-wrapper">
                <input type="text" name="fullname" class="form-input" placeholder="Full name" required data-form-input>
                <input type="email" name="email" class="form-input" placeholder="Email address" required data-form-input>
              </div>

              <div class="input-wrapper">
                <input type="tel" name="phone" class="form-input" placeholder="Phone number" data-form-input>
                <input type="text" name="subject" class="form-input" placeholder="Subject" required data-form-input>
              </div>

              <textarea name="message" class="form-input" placeholder="Your Message" required data-form-input></textarea>

              <button class="form-btn" type="submit" disabled data-form-btn>
                <ion-icon name="paper-plane-outline"></ion-icon>
                <span>Send Message</span>
              </button>

            </form>
          </section>
        </article>

      </div>

      <!-- FOOTER -->
      <footer class="footer">
        <p class="footer-text">
          © 2026 Dakshit Gajipara. All rights reserved.
          <a href="admin.html" onclick="event.preventDefault(); window.open('admin.html', '_blank');" style="color: inherit; margin-left: 8px; opacity: 0.15; transition: opacity 0.3s; display: inline-flex; align-items: center; vertical-align: middle;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.15" title="Admin Panel">
            <ion-icon name="lock-closed-outline"></ion-icon>
          </a>
        </p>
        <div class="footer-socials">
          <a href="https://github.com/dakshitpatel27" target="_blank"><ion-icon name="logo-github"></ion-icon></a>
          <a href="https://www.linkedin.com/in/dakshgajipara2707" target="_blank"><ion-icon name="logo-linkedin"></ion-icon></a>
          <a href="https://www.instagram.com/dakshit_01_?igsh=MWprYXo1aTVxM2x6Ng==" target="_blank"><ion-icon name="logo-instagram"></ion-icon></a>
        </div>
      </footer>

    </div>

  </main>

  <!-- Success Toast Notification -->
  <div id="toast" class="toast">
    <div class="toast-content">
      <ion-icon name="checkmark-circle" class="toast-icon"></ion-icon>
      <div class="toast-message">
        <span class="toast-title">Success</span>
        <span class="toast-desc">Your message has been sent successfully!</span>
      </div>
    </div>
  </div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- 3D Background Logic -->
  <script src="three-bg.js"></script>
  <!-- Dynamic Data config -->
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>
</html>
